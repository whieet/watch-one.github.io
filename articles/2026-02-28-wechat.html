                    <p>大家好！随着元宵节版本的发布，我们收到了很多热情的反馈。为了更方便地与大家交流，听取大家的建议，我们建立了官方微信交流群。</p>

                            <strong>如何加入：</strong><br>
                            1. 截图保存二维码<br>
                            2. 打开微信 → 扫一扫<br>
                            3. 选择相册中的二维码截图
                        </p>
